name: Update bezel index

on:
  schedule:
    - cron: '0 3 1 * *'   # 1st of each month at 3:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Generate index files
        run: |
          cd scripts
          chmod +x tbp-md5gen
          mkdir -p logs
          ./tbp-md5gen generate all

      - name: Deploy index files
        run: |
          # Copy freshly generated index files over the existing ones
          cp -v scripts/thebezelproject/tbp_*.txt thebezelproject/
          # Copy default bezel assets
          cp -v scripts/resources/default.png thebezelproject/
          cp -v scripts/resources/default.info thebezelproject/

      - name: Remove stale index files
        run: |
          # Remove any index files that are no longer in the systems list
          cd thebezelproject
          for f in tbp_*.txt; do
            sys="${f#tbp_}"
            sys="${sys%.txt}"
            if ! grep -q "^${sys} " ../tbp_systems.txt; then
              echo "Removing stale: $f"
              rm -f "$f"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update bezel index $(date +%Y-%m-%d)"
            git push
          fi
